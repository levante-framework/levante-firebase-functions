name: Deploy Levante Admin

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      version_bump:
        description: 'Version bump type (for prod only)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  HUSKY: 0
  DEV_PROJECT_ID: hs-levante-admin-dev
  PROD_PROJECT_ID: hs-levante-admin-prod

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Verify branch is main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::This workflow must be dispatched from main (got ${{ github.ref }})."
            exit 1
          fi
        shell: bash

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.LEVANTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.LEVANTE_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Check Firestore rules file exists
        run: |
          cd functions/levante-admin
          if [ ! -f "firestore.rules" ]; then
            echo "❌ Firestore rules file (firestore.rules) not found!"
            echo "Please create the firestore.rules file before deploying."
            exit 1
          else
            echo "✅ Firestore rules file found"
          fi
        shell: bash

      - name: Check Firestore index drift status
        run: |
          set -euo pipefail
          result=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/check-firestore-index-drift.yml/runs?branch=main&per_page=1" \
            --jq '.workflow_runs[0] | {status: .status, conclusion: .conclusion, html_url: .html_url}')

          status=$(echo "$result" | jq -r '.status')
          conclusion=$(echo "$result" | jq -r '.conclusion')
          url=$(echo "$result" | jq -r '.html_url')

          echo "Latest drift check: status=$status, conclusion=$conclusion"
          echo "Run: $url"

          if [ "$status" != "completed" ]; then
            echo "::error::Firestore index drift check is still running. Wait for it to complete before deploying."
            exit 1
          fi

          if [ "$conclusion" != "success" ]; then
            echo "::error::Firestore index drift check did not pass on main. Resolve index drift before deploying."
            echo "Failed run: $url"
            exit 1
          fi

          echo "✅ Firestore index drift check passed"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        shell: bash

      - name: Authenticate with GCP (deploy target)
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ github.event.inputs.environment == 'prod' && 'hs-levante-admin-prod' || 'hs-levante-admin-dev' }}
          credentials_json: ${{ github.event.inputs.environment == 'prod' && secrets.GCP_SA_CREDENTIALS_PROD || secrets.GCP_SA_CREDENTIALS_DEV }}
          request_reason: 'levante-firebase-functions/deploy run ${{ github.run_id }}'
          access_token_scopes: 'email,openid,https://www.googleapis.com/auth/cloudplatformprojects.readonly,https://www.googleapis.com/auth/firebase,https://www.googleapis.com/auth/cloud-platform'

      - name: Bump version for prod deployment
        if: github.event.inputs.environment == 'prod'
        id: bump-version
        run: |
          cd functions/levante-admin
          
          # Get current version
          current_version=$(node -p "require('./package.json').version")
          echo "Current version: $current_version"
          
          # Bump version (updates package.json; stdout is noisy — read version from file after)
          bump_type="${{ github.event.inputs.version_bump }}"
          npm version "$bump_type" --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          
          echo "New version: $new_version"
          echo "new-version=$new_version" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Configure Git
        if: github.event.inputs.environment == 'prod'
        run: |
          git config --local user.email "levante-bot@github.actions"
          git config --local user.name "Levante Bot"

      - name: Commit version bump
        if: github.event.inputs.environment == 'prod'
        run: |
          git add functions/levante-admin/package.json
          git commit -m "🤖 Bump version to ${{ steps.bump-version.outputs.new-version }} for prod deployment"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        shell: bash

      - name: Push changes
        if: github.event.inputs.environment == 'prod'
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        shell: bash

      - name: Deploy to Firebase
        run: |
          cd functions/levante-admin
          if [ "${{ github.event.inputs.environment }}" == "dev" ]; then
            firebase deploy --only functions,firestore:rules --project ${{ env.DEV_PROJECT_ID }}
          elif [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            firebase deploy --only functions,firestore:rules --project ${{ env.PROD_PROJECT_ID }}
          else
            echo "❌ Invalid environment: ${{ github.event.inputs.environment }}"
            exit 1
          fi
        shell: bash

      - name: Log deployment success
        run: |
          echo "✅ Successfully deployed to ${{ github.event.inputs.environment }}"
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            echo "📦 Version bumped to ${{ steps.bump-version.outputs.new-version }}"
          fi
        shell: bash
