name: Update Firestore Indexes

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  HUSKY: 0

jobs:
  update-indexes:
    name: Update Firestore Indexes from Dev
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.LEVANTE_BOT_APP_ID }}
          private_key: ${{ secrets.LEVANTE_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          npm install -g husky
          npm ci

      - name: Authenticate with GCP (Dev)
        uses: google-github-actions/auth@v2
        with:
          project_id: hs-levante-admin-dev
          credentials_json: ${{ secrets.GCP_SA_CREDENTIALS_DEV }}
          request_reason: "levante-firebase-functions/update-indexes run ${{ github.run_id }}"
          access_token_scopes: "email,openid,https://www.googleapis.com/auth/cloudplatformprojects.readonly,https://www.googleapis.com/auth/firebase,https://www.googleapis.com/auth/cloud-platform"

      - name: Export current Firestore indexes from Dev
        run: |
          cd functions/levante-admin
          npx firebase firestore:indexes --project dev > current-indexes.json
          node scripts/normalize-indexes.js current-indexes.json
        shell: bash

      - name: Check if indexes have changed
        id: check-changes
        run: |
          cd functions/levante-admin

          # Function to normalize JSON for comparison
          normalize_json() {
            jq -S '.' "$1" | sed 's/[[:space:]]//g'
          }

          # Check if firestore.indexes.json exists
          if [ ! -f "firestore.indexes.json" ]; then
            echo "firestore.indexes.json not found, will create it"
            echo "has-changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          cp firestore.indexes.json local-indexes.json
          node scripts/normalize-indexes.js local-indexes.json

          # Normalize both files
          normalize_json "local-indexes.json" > local-normalized.json
          normalize_json "current-indexes.json" > remote-normalized.json

          # Compare the normalized files
          if cmp -s local-normalized.json remote-normalized.json; then
            echo "Indexes are up to date"
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "Indexes have changed"
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Update index file
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          cd functions/levante-admin
          cp current-indexes.json firestore.indexes.json
          echo "Updated firestore.indexes.json with latest indexes from dev project"
        shell: bash

      - name: Configure Git
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Fail when indexes drift (non-main branch)
        if: steps.check-changes.outputs.has-changes == 'true' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::Pre-merge check failed: Index update would fail on merge to main. firestore.indexes.json on this branch does not match the normalized indexes currently deployed in hs-levante-admin-dev."
          echo "Run Deploy Firestore Indexes against this branch (or run validate:indexes locally), then re-run this workflow before merging the branch to main."
          exit 1
        shell: bash

      - name: Commit and push changes
        if: steps.check-changes.outputs.has-changes == 'true' && github.ref == 'refs/heads/main'
        run: |
          git add functions/levante-admin/firestore.indexes.json
          git commit -m "🤖 Auto-update Firestore indexes from dev project

          - Updated indexes from hs-levante-admin-dev
          - Auto-generated by Levante Bot
          - Triggered by merge to main"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Notify merged PR of auto-revert
        if: steps.check-changes.outputs.has-changes == 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          MERGE_SHA: ${{ github.sha }}
          MERGER: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          pr_number=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${MERGE_SHA}/pulls" \
            --jq '.[0].number // empty' || true)

          if [ -z "$pr_number" ]; then
            echo "::warning::Could not find PR for merge commit ${MERGE_SHA}; skipping PR comment."
            exit 0
          fi

          pr_author=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" \
            --jq '.user.login // empty' || true)

          mentions="@${MERGER}"
          if [ -n "$pr_author" ] && [ "$pr_author" != "$MERGER" ]; then
            mentions="${mentions} @${pr_author}"
          fi

          body=$(cat <<EOF
          ${mentions} ⚠️ **Firestore index drift detected after merge — \`firestore.indexes.json\` on \`main\` was auto-rewritten.**

          The post-merge \`update-firestore-indexes\` workflow found that \`functions/levante-admin/firestore.indexes.json\` did not match the live indexes in \`hs-levante-admin-dev\` and committed the dev export over the merged file.

          This usually means one of:
          - \`Deploy Firestore Indexes\` was not run against this branch before merging, so indexes you intended to add were never deployed (and have now been removed from \`main\`).
          - A console/manual change in dev was not reflected in git (in which case this auto-sync is the intended behaviour).

          **If this PR added indexes that should be live:**
          1. Recover the entries from this PR's diff or merge commit (\`${MERGE_SHA}\`).
          2. Open a new PR re-adding them.
          3. Run **Deploy Firestore Indexes** against the new PR branch **before merging**.

          [View workflow run](${RUN_URL})
          EOF
          )

          gh pr comment "$pr_number" --body "$body"

          {
            echo "## Firestore indexes auto-reverted"
            echo ""
            echo "Notified ${mentions} on PR #${pr_number}."
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Log success
        if: steps.check-changes.outputs.has-changes == 'true' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Successfully updated firestore.indexes.json with latest indexes from dev project"
          echo "📝 Changes have been committed to main branch"
        shell: bash

      - name: Log no changes
        if: steps.check-changes.outputs.has-changes == 'false'
        run: |
          echo "✅ Indexes are already up to date"
          echo "📝 No changes needed"
        shell: bash

      - name: Cleanup
        if: always()
        run: |
          cd functions/levante-admin
          rm -f current-indexes.json local-indexes.json local-normalized.json remote-normalized.json
        shell: bash
