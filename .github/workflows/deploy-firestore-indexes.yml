name: Deploy Firestore Indexes

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to checkout"
        required: true
        default: "main"
        type: string
      target_project:
        description: "Project to update"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - preview

env:
  HUSKY: 0
  DEV_PROJECT_ID: hs-levante-admin-dev
  PREVIEW_PROJECT_ID: ${{ vars.PREVIEW_PROJECT || secrets.PREVIEW_PROJECT || vars.SEED_PROJECT || secrets.SEED_PROJECT }}

jobs:
  deploy-indexes:
    name: Deploy indexes to ${{ github.event.inputs.target_project }} from ${{ github.event.inputs.branch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Show run context
        run: |
          checked_out_sha=$(git rev-parse HEAD)
          checked_out_short=$(git rev-parse --short HEAD)
          {
            echo "## Deploy Firestore Indexes"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Branch input | \`${{ github.event.inputs.branch }}\` |"
            echo "| Checked-out commit | [\`${checked_out_short}\`](${{ github.server_url }}/${{ github.repository }}/commit/${checked_out_sha}) |"
            echo "| Target project | \`${{ github.event.inputs.target_project }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Branch:           ${{ github.event.inputs.branch }}"
          echo "Checked-out SHA:  ${checked_out_sha}"
          echo "Target project:   ${{ github.event.inputs.target_project }}"
          echo "Triggered by:     ${{ github.actor }}"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate local Firestore indexes file
        run: |
          if [ ! -f "functions/levante-admin/firestore.indexes.json" ]; then
            echo "❌ functions/levante-admin/firestore.indexes.json not found"
            exit 1
          fi
        shell: bash

      - name: Resolve target project
        id: resolve-target
        run: |
          if [ "${{ github.event.inputs.target_project }}" = "preview" ]; then
            project_id="${PREVIEW_PROJECT_ID}"
          else
            project_id="${DEV_PROJECT_ID}"
          fi

          if [ -z "$project_id" ]; then
            echo "❌ Target project ID is not configured"
            exit 1
          fi

          echo "project_id=$project_id" >> "$GITHUB_OUTPUT"
          echo "Resolved target project: $project_id"
        env:
          DEV_PROJECT_ID: ${{ env.DEV_PROJECT_ID }}
          PREVIEW_PROJECT_ID: ${{ env.PREVIEW_PROJECT_ID }}
        shell: bash

      - name: Authenticate with GCP (dev)
        if: github.event.inputs.target_project == 'dev'
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.DEV_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_CREDENTIALS_DEV }}
          request_reason: "levante-firebase-functions/deploy-firestore-indexes run ${{ github.run_id }}"
          access_token_scopes: "email,openid,https://www.googleapis.com/auth/cloudplatformprojects.readonly,https://www.googleapis.com/auth/firebase,https://www.googleapis.com/auth/cloud-platform"

      - name: Authenticate to Firebase (preview service account)
        if: github.event.inputs.target_project == 'preview'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PREVIEW_DEV }}' > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
        shell: bash

      - name: Normalize Firestore indexes for deploy
        run: node functions/levante-admin/scripts/normalize-indexes.js
        shell: bash

      - name: Check if indexes differ from target project
        id: check-changes
        run: |
          cd functions/levante-admin
          npx firebase firestore:indexes --project "${{ steps.resolve-target.outputs.project_id }}" > current-indexes.json
          node scripts/normalize-indexes.js current-indexes.json

          normalize_json() { jq -S '.' "$1" | sed 's/[[:space:]]//g'; }

          if cmp -s <(normalize_json firestore.indexes.json) <(normalize_json current-indexes.json); then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No index differences detected between this branch and ${{ steps.resolve-target.outputs.project_id }}."
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Index differences detected — deploy will apply changes."
          fi
        shell: bash

      - name: Deploy Firestore indexes
        run: |
          npx firebase deploy --only firestore:indexes --project "${{ steps.resolve-target.outputs.project_id }}" --non-interactive
        shell: bash

      - name: Warn if no index changes were deployed
        if: steps.check-changes.outputs.has-changes == 'false'
        run: |
          echo "::warning::No index changes detected — firestore.indexes.json on branch '${{ github.event.inputs.branch }}' already matches what is deployed in ${{ steps.resolve-target.outputs.project_id }}. The deploy was a no-op."
          {
            echo "## ⚠️ No index changes detected"
            echo ""
            echo "\`firestore.indexes.json\` on branch \`${{ github.event.inputs.branch }}\` already matches the indexes deployed in \`${{ steps.resolve-target.outputs.project_id }}\`. The deploy was a no-op."
            echo ""
            echo "If you expected this run to add or change indexes, verify:"
            echo "- The new entries are committed to this branch."
            echo "- You ran this workflow against the correct branch."
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Cleanup
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/firebase-sa.json"
          rm -f functions/levante-admin/current-indexes.json
        shell: bash
